# Base Compliance Contract — Compliance-Ready Baseline
# Designed to be extended by industry-specific contracts.
#
# This template satisfies baseline requirements for:
# - EU AI Act (Articles 12, 13, 15)
# - SOC 2 (CC6.1, CC6.6, CC7.2)
# - GDPR (Articles 30, 32)
# - NIST AI RMF (GOVERN, MAP)
#
# Usage:
#   gov.loadContractYAML(fs.readFileSync("base-compliance.contract.yaml", "utf-8"));

schema_version: "1.0"
metadata:
  name: Base Compliance Policy
  version: "1.0.0"
  author: Compliance Team
  description: >
    Baseline compliance contract satisfying fundamental regulatory requirements
    across EU AI Act, SOC 2, GDPR, and NIST AI RMF. Extend for industry-specific
    regulations (HIPAA, PCI-DSS, etc.).
  effective_date: "2025-01-01"
  review_date: "2025-04-01"
  stakeholders: [CISO, DPO, Compliance Officer, General Counsel]

data_governance:
  allowed_input_classes: [public, internal]
  allowed_output_classes: [public]
  retention_period: P365D
  cross_border_transfer: false

rules:
  # --- Data Governance (GDPR Art 32, SOC 2 CC6.1) ---
  - id: COMP-DATA-001
    description: Block outputs containing restricted data classes
    action: "*"
    conditions:
      - field: output.data_classification
        operator: not_in
        value: ["restricted", "confidential"]
    on_violation: block
    message: "Output contains restricted/confidential data class"
    tags: [compliance, data-governance, gdpr, soc2]

  # --- Access Control (SOC 2 CC6.3, HIPAA 164.312) ---
  - id: COMP-ACCESS-001
    description: Require authenticated caller
    action: "*"
    conditions:
      - field: caller.user_id
        operator: exists
        value: true
    on_violation: block
    message: "Unauthenticated request — caller.user_id required"
    tags: [compliance, access-control, soc2]

  - id: COMP-ACCESS-002
    description: Log all access for audit trail
    action: "*"
    conditions:
      - field: caller.session_id
        operator: exists
        value: true
    on_violation: log
    tags: [compliance, audit, soc2]

  # --- Transparency (EU AI Act Art 13) ---
  - id: COMP-TRANS-001
    description: Require AI disclosure on all outputs
    action: generate
    conditions:
      - field: metadata.ai_disclosure
        operator: equals
        value: true
    on_violation: modify
    obligations:
      - obligation_id: OBL-COMP-DISCLOSURE
        type: append_notice
        params:
          text: "This content was generated by an AI system."
    tags: [compliance, transparency, eu-ai-act]

  # --- Logging (EU AI Act Art 12, NIST GOVERN-1) ---
  - id: COMP-LOG-001
    description: Ensure all decisions are recorded
    action: "*"
    conditions:
      - field: caller.user_id
        operator: exists
        value: true
    on_violation: log
    tags: [compliance, logging, eu-ai-act, nist]

  # --- Rate Limiting (SOC 2 CC6.6) ---
  - id: COMP-RATE-001
    description: Enterprise rate limit (1000/hour)
    action: "*"
    conditions:
      - field: caller.user_id
        operator: rate_limit
        value:
          max: 1000
          window: PT1H
    on_violation: block
    message: "Enterprise rate limit exceeded"
    tags: [compliance, rate-limit, soc2]

  # --- Data Minimization (GDPR Art 5) ---
  - id: COMP-MIN-001
    description: Warn when output contains more data than requested
    action: generate
    conditions:
      - field: output.data_minimization_check
        operator: equals
        value: true
    on_violation: warn
    message: "Output may contain more data than necessary for the request"
    tags: [compliance, gdpr, data-minimization]

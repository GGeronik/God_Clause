schema_version: "1.0"
metadata:
  name: LLM Safety Guardrails
  version: "1.0.0"
  author: AI Safety Team
  description: >
    Safety guardrails for large language model deployments. Covers prompt
    injection defense, output filtering, hallucination mitigation, and
    content safety policies.
  effective_date: "2025-01-01"
  review_date: "2025-04-01"
  stakeholders: [VP Engineering, AI Safety Lead, Legal]

data_governance:
  allowed_input_classes: [public, internal]
  allowed_output_classes: [public]
  retention_period: P90D
  cross_border_transfer: true

rules:
  - id: LLM-001
    description: Block prompt injection attempts
    action: "*"
    conditions:
      - field: input.injection_score
        operator: less_than
        value: 0.7
    on_violation: block
    message: "Prompt injection detected — request blocked"
    tags: [security, prompt-injection]

  - id: LLM-002
    description: Filter harmful content from outputs
    action: generate
    conditions:
      - field: output.toxicity_score
        operator: less_than
        value: 0.3
    on_violation: block
    message: "Output exceeds toxicity threshold"
    tags: [content-safety, toxicity]

  - id: LLM-003
    description: Flag low-confidence responses
    action: generate
    conditions:
      - field: output.confidence
        operator: greater_than
        value: 0.6
    on_violation: modify
    obligations:
      - obligation_id: OBL-001
        type: prepend_disclaimer
        params:
          text: "Note: This response has lower confidence and may contain inaccuracies. Please verify independently."
    tags: [hallucination, quality]

  - id: LLM-004
    description: Enforce output length limits
    action: generate
    conditions:
      - field: output.token_count
        operator: less_than
        value: 4096
    on_violation: modify
    obligations:
      - obligation_id: OBL-002
        type: truncate_output
        params:
          max_tokens: 4096
    tags: [cost-control, resource-limits]

  - id: LLM-005
    description: No PII in generated outputs
    action: generate
    conditions:
      - field: output.contains_pii
        operator: equals
        value: false
    on_violation: modify
    obligations:
      - obligation_id: OBL-003
        type: redact_pii
        params:
          replacement: "[REDACTED]"
    tags: [privacy, data-protection]

  - id: LLM-006
    description: Rate limit per user to prevent abuse
    action: "*"
    conditions:
      - field: caller.user_id
        operator: rate_limit
        value:
          max: 60
          window: PT1M
    on_violation: block
    message: "Rate limit exceeded — please wait before sending more requests"
    tags: [abuse-prevention, rate-limit]

  - id: LLM-007
    description: Block requests for code generation without review flag
    action: generate_code
    conditions:
      - field: metadata.code_review_enabled
        operator: equals
        value: true
    on_violation: warn
    message: "Code generation without review flag enabled"
    tags: [security, code-safety]

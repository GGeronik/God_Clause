# Anti-Hallucination Contract
# Drop-in protection: require confidence scores, add disclaimers on low-confidence outputs,
# flag responses without citations.
#
# Usage:
#   gov.loadContractYAML(fs.readFileSync("anti-hallucination.contract.yaml", "utf-8"));
#
# Your application must:
#   1. Set output.confidence from your model's confidence estimator (0.0-1.0)
#   2. Set output.has_citations boolean for grounded response checking
#   3. Handle "prepend_disclaimer" and "require_review" obligations
#
# Compliance: EU AI Act Art 13 (transparency), NIST AI RMF MAP-2

schema_version: "1.0"
metadata:
  name: Anti-Hallucination Guardrails
  version: "1.0.0"
  author: AI Safety Team
  description: >
    Mitigate hallucination risk by requiring confidence scores, adding
    disclaimers to low-confidence outputs, and flagging responses that
    lack citations or factual grounding.
  effective_date: "2025-01-01"
  review_date: "2025-04-01"
  stakeholders: [VP Engineering, AI Safety Lead, Product]

data_governance:
  allowed_input_classes: [public, internal]
  allowed_output_classes: [public]
  retention_period: P90D
  cross_border_transfer: true

rules:
  - id: HALL-001
    description: Block extremely low-confidence responses
    action: generate
    conditions:
      - field: output.confidence
        operator: greater_than
        value: 0.3
    on_violation: block
    message: "Response confidence too low (< 0.3) — blocked to prevent hallucination"
    tags: [hallucination, quality, safety]

  - id: HALL-002
    description: Add disclaimer to low-confidence responses
    action: generate
    conditions:
      - field: output.confidence
        operator: greater_than
        value: 0.7
    on_violation: modify
    obligations:
      - obligation_id: OBL-DISCLAIMER
        type: prepend_disclaimer
        params:
          text: "Note: This response has lower confidence and may contain inaccuracies. Please verify independently."
    tags: [hallucination, quality, transparency]

  - id: HALL-003
    description: Flag responses without citations for review
    action: generate
    conditions:
      - field: output.has_citations
        operator: equals
        value: true
    on_violation: modify
    obligations:
      - obligation_id: OBL-CITATION-WARNING
        type: append_notice
        params:
          text: "This response does not include source citations. Factual claims should be independently verified."
    tags: [hallucination, grounding, transparency]

  - id: HALL-004
    description: Require human review for critical decisions
    action: ["decide", "recommend"]
    conditions:
      - field: output.confidence
        operator: greater_than
        value: 0.85
    on_violation: modify
    obligations:
      - obligation_id: OBL-HUMAN-REVIEW
        type: require_review
        params:
          reason: "Decision confidence below 0.85 threshold"
          escalate_to: "human_reviewer"
    tags: [hallucination, safety, human-in-the-loop]

  - id: HALL-005
    description: Log all confidence scores for monitoring
    action: generate
    conditions:
      - field: output.confidence
        operator: exists
        value: true
    on_violation: log
    tags: [hallucination, monitoring]

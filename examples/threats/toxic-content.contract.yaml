# Toxic Content Filtering Contract
# Drop-in protection: block harmful, NSFW, hate speech, and self-harm content.
#
# Usage:
#   gov.loadContractYAML(fs.readFileSync("toxic-content.contract.yaml", "utf-8"));
#
# Your application must:
#   1. Set output.toxicity_score from your toxicity classifier (0.0-1.0)
#   2. Set output.categories array with detected content categories
#   3. Optionally set output.nsfw_score for NSFW detection
#
# Compliance: EU AI Act Art 5, SOC 2 CC1.1

schema_version: "1.0"
metadata:
  name: Toxic Content Filter
  version: "1.0.0"
  author: Content Safety Team
  description: >
    Filter harmful, toxic, NSFW, and dangerous content from AI outputs.
    Uses toxicity scores and content category classification to block or
    flag inappropriate responses.
  effective_date: "2025-01-01"
  review_date: "2025-04-01"
  stakeholders: [VP Product, Legal, Trust & Safety]

data_governance:
  allowed_input_classes: [public, internal]
  allowed_output_classes: [public]
  retention_period: P180D
  cross_border_transfer: true

rules:
  - id: TOX-001
    description: Block highly toxic content
    action: generate
    conditions:
      - field: output.toxicity_score
        operator: less_than
        value: 0.7
    on_violation: block
    message: "Output toxicity score exceeds safety threshold (0.7)"
    tags: [content-safety, toxicity, critical]

  - id: TOX-002
    description: Warn on moderately toxic content
    action: generate
    conditions:
      - field: output.toxicity_score
        operator: less_than
        value: 0.3
    on_violation: warn
    message: "Output has elevated toxicity score"
    tags: [content-safety, toxicity]

  - id: TOX-003
    description: Block hate speech
    action: generate
    conditions:
      - field: output.categories
        operator: not_contains
        value: "hate_speech"
    on_violation: block
    message: "Hate speech detected in output — blocked"
    tags: [content-safety, hate-speech, critical]

  - id: TOX-004
    description: Block self-harm content
    action: generate
    conditions:
      - field: output.categories
        operator: not_contains
        value: "self_harm"
    on_violation: block
    message: "Self-harm content detected — blocked"
    tags: [content-safety, self-harm, critical]

  - id: TOX-005
    description: Block NSFW content
    action: generate
    conditions:
      - field: output.nsfw_score
        operator: less_than
        value: 0.5
    on_violation: block
    message: "NSFW content detected — blocked"
    tags: [content-safety, nsfw]

  - id: TOX-006
    description: Block violent content
    action: generate
    conditions:
      - field: output.categories
        operator: not_contains
        value: "violence"
    on_violation: block
    message: "Violent content detected — blocked"
    tags: [content-safety, violence, critical]

version: "3.8"
services:
  god-clause:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./contracts:/app/contracts
      - ./audit:/app/audit
    environment:
      - AUDIT_HMAC_SECRET=${AUDIT_HMAC_SECRET:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/v1/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
